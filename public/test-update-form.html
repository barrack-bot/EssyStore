<!DOCTYPE html>
<html>
<head>
    <title>Test Profile Update</title>
</head>
<body>
    <h1>Test Profile Update API</h1>
    
    <form id="testForm">
        <div>
            <label>Name:</label>
            <input type="text" name="name" value="Updated Test Name">
        </div>
        <div>
            <label>Email:</label>
            <input type="email" name="email" value="updated@test.com">
        </div>
        <button type="submit">Test Update</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('../api/auth/update-profile.php', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Response:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
